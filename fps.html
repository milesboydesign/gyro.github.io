<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FPS Prototype — Neon Arcade</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="game-page">
<div class="game-header" style="max-width:720px">
  <a class="back-link" href="index.html">← arcade</a>
  <h1>FPS Prototype</h1>
</div>
<div class="card center" style="width:100%;max-width:900px;min-height:520px;position:relative;padding:0;overflow:hidden">
  <canvas id="three" style="width:100%;height:100%;display:block"></canvas>
  <div id="crosshair" style="position:absolute;left:50%;top:50%;width:10px;height:10px;transform:translate(-50%,-50%);border-radius:50%;background:rgba(77,208,255,0.85);mix-blend-mode:screen;display:none"></div>
  <div class="overlay" style="position:absolute;left:18px;top:18px;align-items:flex-start;pointer-events:none">
    <div class="hud" id="fps-info">Speed: 0 km/h</div>
    <div class="hud" id="fps-status">Click START to lock pointer and play</div>
  </div>
</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;max-width:900px;margin-top:16px">
  <button id="fps-start" class="btn">START</button>
  <div class="controls">WASD to move · Shift to sprint · Mouse to look</div>
</div>
<script type="module" src="js/fps.js"></script>
</body>
</html>
